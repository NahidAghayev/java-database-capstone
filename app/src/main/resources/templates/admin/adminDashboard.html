<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" href="../../static/assets/css/adminDashboard.css">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" href="../../static/assets/css/style.css">
  <script th:src="@{/js/render.js}" src="../../static/js/render.js" defer></script>
  <script th:src="@{/js/util.js}" src="../../static/js/util.js" defer></script>
  <script th:src="@{/js/components/header.js}" src="../../static/js/components/header.js" defer></script>
  <script th:src="@{/js/components/footer.js}" src="../../static/js/components/footer.js" defer></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <main class="main-content">
        <input type="text" id="searchBar" placeholder="search by doctor name" />
        <select id="timeFilter">
          <option value="">Sort by time</option>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
        <select id="specialtyFilter">
          <option value="">Filter by specialty</option>
          <option value="Cardiologist">Cardiologist</option>
          <option value="Dermatologist">Dermatologist</option>
          <option value="Neurologist">Neurologist</option>
          <option value="Pediatrician">Pediatrician</option>
          <option value="Orthopedic">Orthopedic</option>
          <option value="Gynecologist">Gynecologist</option>
          <option value="Psychiatrist">Psychiatrist</option>
          <option value="Dentist">Dentist</option>
          <option value="Ophthalmologist">Ophthalmologist</option>
          <option value="ENT Specialist">ENT Specialist</option>
          <option value="Urologist">Urologist</option>
          <option value="Oncologist">Oncologist</option>
          <option value="Gastroenterologist">Gastroenterologist</option>
          <option value="General Physician">General Physician</option>
        </select>
        <div id="content"></div>
      </main>
      <div id="footer"></div>
    </div>
  </div>
  <div id="modal" class="modal">
    <div id="modal-body">
      <span id="closeModal" class="close">&times;</span>
    </div>
  </div>
  <script type="module" th:src="@{/js/services/adminDashboard.js}" src="../../static/js/services/adminDashboard.js" defer></script>
  <script type="module" th:src="@{/js/components/doctorCard.js}" src="../../static/js/components/doctorCard.js" defer></script>
</body>
</html>
