<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" href="../../static/assets/images/logo/logo.png" />
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" href="../../static/assets/css/adminDashboard.css">
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" href="../../static/assets/css/doctorDashboard.css">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" href="../../static/assets/css/style.css">
  <script th:src="@{/js/render.js}" src="../../static/js/render.js" defer></script>
  <script th:src="@{/js/util.js}" src="../../static/js/util.js" defer></script>
  <script th:src="@{/js/components/header.js}" src="../../static/js/components/header.js" defer></script>
  <script th:src="@{/js/components/footer.js}" src="../../static/js/components/footer.js" defer></script>
  <script th:src="@{/js/components/patientRows.js}" src="../../static/js/components/patientRows.js" defer></script>
  <script th:src="@{/js/services/patientServices.js}" src="../../static/js/services/patientServices.js" defer></script>
  <script type="module" th:src="@{/js/doctorDashboard.js}" src="../../static/js/doctorDashboard.js" defer></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <div class="main-content">
        <input type="text" id="searchBar" class="searchBar" placeholder="Search Bar for custom output" />
        <div class="filter-section">
          <button id="todayButton">Today's Appointments</button>
          <input type="date" id="datePicker" />
        </div>
        <table id="patientTable">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Name</th>
              <th>Phone No.</th>
              <th>Email</th>
              <th>Prescription</th>
            </tr>
          </thead>
          <tbody id="patientTableBody"></tbody>
        </table>
      </div>
      <div id="footer"></div>
    </div>
  </div>
</body>
</html>
